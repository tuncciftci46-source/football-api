openapi: 3.0.0
info:
  title: Football API
  description: 65 lig, canli skor, puan durumu, takim bilgileri - ESPN + FlashScore
  version: 2.0.0
  contact:
    name: Football API

servers:
  - url: https://roots-hospital-gates-indie.trycloudflare.com
    description: Production

security:
  - ApiKeyAuth: []

paths:
  /api/health:
    get:
      summary: API durumu
      responses:
        '200':
          description: Saglik kontrolu

  /api/leagues:
    get:
      summary: Tum ligler
      responses:
        '200':
          description: 65 lig listesi

  /api/matches:
    get:
      summary: Maclari getir
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [live, upcoming, finished]
          description: Mac durumu
        - name: league
          in: query
          schema:
            type: string
          description: Lig ID (ornek eng.1, tur.1)
        - name: search
          in: query
          schema:
            type: string
          description: Takim veya lig adi
      responses:
        '200':
          description: Mac listesi

  /api/standings/{leagueId}:
    get:
      summary: Puan durumu
      parameters:
        - name: leagueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Puan durumu

  /api/teams/{leagueId}:
    get:
      summary: Takim listesi
      parameters:
        - name: leagueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Takim listesi

  /api/extra/{leagueId}:
    get:
      summary: FlashScore ligleri (Finlandiya, Belarus vb.)
      parameters:
        - name: leagueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: FlashScore maclari

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
